name: E2E TLS Tests

on:
  pull_request:
    paths:
      - 'panopticon-agent/**'
      - 'panopticon-ebpf/**'
      - 'panopticon-common/**'
      - 'tests/e2e/**'
      - '.github/workflows/e2e-tls.yml'
  push:
    branches: [main, master]

env:
  BPF_TOOLCHAIN: nightly-2026-02-17

jobs:
  e2e-tls:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and cache E2E agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/e2e/Dockerfile.agent
          load: true
          tags: panopticon/e2e-agent:ci
          cache-from: type=gha,scope=e2e-agent
          cache-to: type=gha,mode=max,scope=e2e-agent

      - name: Run E2E TLS tests
        run: PREBUILT_IMAGES=1 bash tests/e2e/run_tests.sh
