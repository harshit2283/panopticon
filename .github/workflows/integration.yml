name: Integration Tests

on:
  pull_request:
  push:
    branches: [main, master]

env:
  BPF_TOOLCHAIN: nightly-2026-02-17

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and cache traffic generator image
        uses: docker/build-push-action@v6
        with:
          context: tests/integration
          file: tests/integration/Dockerfile.traffic-gen
          load: true
          tags: panopticon/integration-traffic-gen:ci
          cache-from: type=gha,scope=integration-traffic-gen
          cache-to: type=gha,mode=max,scope=integration-traffic-gen

      - name: Build and cache integration agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/integration/Dockerfile.agent
          load: true
          tags: panopticon/integration-agent:ci
          cache-from: type=gha,scope=integration-agent
          cache-to: type=gha,mode=max,scope=integration-agent

      - name: Run E2E tests
        run: PREBUILT_IMAGES=1 bash tests/integration/runner.sh

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: tests/integration/output/
          retention-days: 7
