services:
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - testnet

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: testdb
    volumes:
      - ./configs/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -ptestpass"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 10s
    networks:
      - testnet

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    volumes:
      - ./configs/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - testnet

  redis:
    image: redis:7-alpine
    networks:
      - testnet

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.5
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster metadata --brokers=localhost:9092 >/dev/null 2>&1"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    networks:
      - testnet

  traffic-gen:
    image: panopticon/integration-traffic-gen:ci
    build:
      context: .
      dockerfile: Dockerfile.traffic-gen
    depends_on:
      - nginx
      - mysql
      - postgres
      - redis
      - kafka
    networks:
      - testnet
    volumes:
      - ./traffic:/traffic:ro
      - ./output:/output

  agent:
    image: panopticon/integration-agent:ci
    build:
      context: ../..
      dockerfile: tests/integration/Dockerfile.agent
    privileged: true
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - BPF
    network_mode: "service:traffic-gen"
    pid: "service:traffic-gen"
    volumes:
      - ./output:/output
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /sys/fs/bpf:/sys/fs/bpf
    command: >
      --interface eth0
      --log-events
      --json-export /output/events.jsonl

networks:
  testnet:
    driver: bridge
