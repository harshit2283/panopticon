worker_processes 1;
events { worker_connections 64; }

http {
    # HTTP/1.1 on port 80
    server {
        listen 80;
        server_name localhost;

        location /api/users {
            default_type application/json;
            return 200 '{"users":[{"name":"John Doe","email":"john@example.com","ssn":"123-45-6789"}]}';
        }

        location /api/health {
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        location /api/empty {
            return 204;
        }
    }

    # HTTP/2 (h2c cleartext) on port 8080
    server {
        listen 8080 http2;
        server_name localhost;

        location /api/users {
            default_type application/json;
            return 200 '{"users":[{"name":"Jane Doe","email":"jane@example.com","phone":"+1-555-123-4567"}]}';
        }
    }
}
