services:
  postgres:
    image: postgres:15
    network_mode: host
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d testdb"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    network_mode: host
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:alpine
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  openssl-server:
    build:
      context: ./openssl-server
      dockerfile: Dockerfile
    network_mode: host
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:8443/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  go-tls-server:
    build:
      context: ./go-tls-server
      dockerfile: Dockerfile
    network_mode: host
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:8444/"]
      interval: 2s
      timeout: 5s
      retries: 10

  agent:
    image: panopticon/e2e-agent:ci
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile.agent
    command:
      [
        "--interface",
        "lo",
        "--log-events",
        "--json-export",
        "/output/events.jsonl",
      ]
    privileged: true
    network_mode: host
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /proc:/proc:ro
      - ./output:/output
    environment:
      - RUST_LOG=debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nginx:
        condition: service_started
      openssl-server:
        condition: service_healthy
      go-tls-server:
        condition: service_healthy
