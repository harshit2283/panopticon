{{- if .Values.agent.config -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "panopticon.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "panopticon.labels" . | nindent 4 }}
data:
  config.toml: |
    # Generated by Helm from values.agent.config
    {{- if kindIs "string" .Values.agent.config }}
    {{ .Values.agent.config | nindent 4 }}
    {{- else }}
    {{- /* Render map as TOML key=value pairs */ -}}
    {{- range $key, $value := .Values.agent.config }}
    {{ $key }} = {{ $value | toJson }}
    {{- end }}
    {{- end }}
{{- end }}
